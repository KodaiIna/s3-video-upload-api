name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore S3VideoUploadApi.slnx

      - name: Build
        run: dotnet build S3VideoUploadApi.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test S3VideoUploadApi.slnx --configuration Release --no-build --no-restore
